# SAFAIR — Amplify Custom Response Headers
# Deployed via Amplify customHttp.yml mechanism.
# Closes pentest findings F-05 (security headers absent) and contributes to F-13.
#
# ROLLOUT PHASE: 2 of 2 — CSP ENFORCING.
# Phase 1 (Report-Only) ran clean — no violations across Home, /insights,
# /construction-dust, /recommendations, and subpaths with full interaction
# (suburb chips, map pan/zoom, geolocation accept). Phase 2 promotes the
# policy to enforcing and bumps HSTS to 1-year.
#
# Rollback to Report-Only if anything breaks: rename
# `Content-Security-Policy` back to `Content-Security-Policy-Report-Only`
# and redeploy.
#
# Applies to all paths on all custom domains (safair.site, www.safair.site)
# and the Amplify-generated domain.

customHeaders:
  - pattern: '**'
    headers:
      # -------- Transport / clickjacking / sniffing / referer --------

      # HSTS — 1 year. Browser will refuse plain HTTP to this host for 365 days
      # after last visit. `preload` deliberately NOT set — that's an irreversible
      # submission to Chrome's preload list, a separate decision.
      - key: 'Strict-Transport-Security'
        value: 'max-age=31536000; includeSubDomains; preload'

      # Browsers honour frame-ancestors from CSP over X-Frame-Options when both
      # are present, but we set both for older browsers. DENY = no iframing.
      - key: 'X-Frame-Options'
        value: 'DENY'

      # Stop browsers from MIME-sniffing responses.
      - key: 'X-Content-Type-Options'
        value: 'nosniff'

      # Don't leak the full URL (including query strings) in the Referer header.
      # strict-origin-when-cross-origin is the modern sweet spot.
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'

      # -------- Permissions-Policy --------
      # Disable every powerful API the app doesn't need. Keep geolocation=(self)
      # because Epic 3 asks for the user's location on the home page.
      # If Epic 5/6/7 later need camera/microphone, add them here explicitly.
      - key: 'Permissions-Policy'
        value: 'geolocation=(self), camera=(), microphone=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()'

      # -------- CSP — ENFORCING (phase 2) --------
      #
      # Same policy as phase 1, promoted from Report-Only to enforcing after
      # a full-site DevTools walk produced zero violations on 2026-04-23.
      #
      # Sources allowed:
      #   default-src 'self'                         — same origin baseline
      #   script-src 'self' https://unpkg.com/leaflet@1.9.4/
      #                                              — Vite-built JS bundles + Leaflet 1.9.4 only (path-pinned, SRI-verified).
      #   style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com/leaflet@1.9.4/
      #                                              — Vue scoped styles + Leaflet 1.9.4 CSS + Google Fonts CSS.
      #                                               Tighten 'unsafe-inline' to hashes/nonces in a future iteration.
      #   img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com
      #                                              — Leaflet tiles (OSM + CARTO) + inline data: SVGs / favicons + local upload previews.
      #   connect-src 'self' https://d204zergykc1k6.cloudfront.net
      #                                              — CloudFront (in front of API Gateway v2 HTTP API). Also self for service worker.
      #   font-src 'self' data: https://fonts.gstatic.com
      #                                              — local fonts, embedded glyphs, and Google Fonts font files.
      #   frame-ancestors 'none'                     — belt-and-braces with X-Frame-Options: DENY.
      #   base-uri 'self'                            — stop dangling-markup / base-tag injection.
      #   form-action 'self'                         — forms can only submit same-origin.
      #   object-src 'none'                          — no Flash/Java applets/etc.
      #   worker-src 'self'                          — service worker for push notifications.
      #
      # Note: push notifications were removed for Iter 1. If/when Iter 2+
      # re-enables them, `connect-src` will need the browser-specific push
      # service endpoints (fcm.googleapis.com / updates.push.services.mozilla.com /
      # *.windows.com) added. Re-run phase 1 observation first.
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; script-src 'self' https://unpkg.com/leaflet@1.9.4/; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com/leaflet@1.9.4/; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.basemaps.cartocdn.com; connect-src 'self' https://d204zergykc1k6.cloudfront.net; font-src 'self' data: https://fonts.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; worker-src 'self'"
